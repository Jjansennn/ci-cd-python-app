name: Release

on:
  push:
    tags:
      - "release*"

jobs:
  build:
    name: Build Release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
            python -m pip install --upgrade pip
            pip install pytest

      - name: Create tarball
        run: tar -czf "../contoh-cd.tar.gz" . 

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ../contoh-cd.tar.gz

